# ============================================================================
# CleanTenant — Docker Compose (Development)
# ============================================================================
# KULLANIM:
#   cd docker
#   docker-compose --env-file ../.env up -d          → Başlat
#   docker-compose --env-file ../.env down            → Durdur
#   docker-compose --env-file ../.env down -v         → Durdur + Volume sil
#   docker-compose --env-file ../.env logs -f redis   → Log izle
#
# TEMİZLEME (Sıfırdan başlamak için):
#   docker-compose --env-file ../.env down -v
#   docker volume prune -f
#   docker-compose --env-file ../.env up -d
# ============================================================================

services:

  postgres-main:
    image: postgres:17-alpine
    container_name: ct-db-main
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      TZ: "Europe/Istanbul"
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - ct-pgdata-main:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - ct-network

  postgres-audit:
    image: postgres:17-alpine
    container_name: ct-db-audit
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${AUDIT_DB_NAME}
      POSTGRES_USER: ${AUDIT_DB_USER}
      POSTGRES_PASSWORD: ${AUDIT_DB_PASSWORD}
      TZ: "Europe/Istanbul"
    ports:
      - "${AUDIT_DB_PORT}:5432"
    volumes:
      - ct-pgdata-audit:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUDIT_DB_USER} -d ${AUDIT_DB_NAME}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - ct-network

  redis:
    image: redis:7-alpine
    container_name: ct-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - ct-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - ct-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ct-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "${PGADMIN_PORT}:80"
    volumes:
      - ct-pgadmin-data:/var/lib/pgadmin
    depends_on:
      postgres-main:
        condition: service_healthy
      postgres-audit:
        condition: service_healthy
    networks:
      - ct-network

  seq:
    image: datalust/seq:latest
    container_name: ct-seq
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
    ports:
      - "${SEQ_PORT}:80"
    volumes:
      - ct-seq-data:/data
    networks:
      - ct-network

volumes:
  ct-pgdata-main:
  ct-pgdata-audit:
  ct-redis-data:
  ct-pgadmin-data:
  ct-seq-data:

networks:
  ct-network:
    driver: bridge
